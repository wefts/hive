# Main orchestrator for this hive — wires the public Swarm kernel substrate
# plus private/local plugin adapters.
#
# This repo lives next to the public `swarm/` repo. The public repo ships only
# generic substrate (`../swarm/dev/docker-compose.yml`) + the service Dockerfiles
# (packaging); THIS file is the instance orchestrator and stays private.
#
# Run from the hive root: `docker compose up -d`
# Reads `.env` from this dir; plugins load secrets via `env_file`.
#
# Topology (single node): Postgres, the Elixir kernel, and the Python ML service
# are all containerized here; Ollama runs on the HOST (reached via
# host.docker.internal). Grow this file spawn -> compose -> k8s without touching
# the kernel (the gRPC port ABI is invariant — see system_architecture §9/§10).

include:
  # Postgres + pgvector — the one stateful dependency, owned by the kernel.
  - ../swarm/dev/docker-compose.yml

services:
  # --- Schema migration (one-shot) ----------------------------------------
  # A release has no `mix ecto.migrate`; run migrations via the release `eval`
  # (Swarm.Release.migrate/0), then exit. The kernel waits for this to succeed.
  migrate:
    image: swarm-kernel:0.1.0
    build:
      context: ../swarm/kernel
      args:
        HUB_REGISTRY: ${HUB_REGISTRY:-dockerhub.smile.fr}
        DHI_REGISTRY: ${DHI_REGISTRY:-dhi.smile.fr}
    init: true            # docker-init as PID 1 → reaps the BEAM's epmd child
    command: ["eval", "Swarm.Release.migrate()"]
    environment:
      SWARM_DB_HOST: postgres
      SWARM_DB_PORT: "5432"
      SWARM_DB_USER: ${SWARM_DB_USER:-swarm}
      SWARM_DB_PASSWORD: ${SWARM_DB_PASSWORD:-swarm}
      SWARM_DB_NAME: ${SWARM_DB_NAME:-swarm_dev}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # --- Model runtime: Ollama (GPU), containerized in the stack --------------
  # Self-contained: no host Ollama, no host.docker.internal, no loosening the
  # host's network. GPU via the NVIDIA container runtime. The 238 GB of models
  # already on the host are mounted read-only — nothing is re-downloaded, and the
  # stack stays offline-capable. (Canon historically ran Ollama on the host; this
  # is the deployment instance's choice and is documented in hive.)
  ollama:
    image: ${HUB_REGISTRY:-dockerhub.smile.fr}/ollama/ollama:0.30.6@sha256:fbaaecc6c632a73c2b4ca25ef52dbee0b68d07783fcb850f916404c004040f90
    init: true
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Consilium runs a parallel panel; raise the default cap (3) so the whole
      # fleet can stay GPU-resident. GB10 unified memory is the real limit, not this.
      OLLAMA_MAX_LOADED_MODELS: "6"
      OLLAMA_NUM_PARALLEL: "2"
    volumes:
      - ${OLLAMA_MODELS_DIR:-/usr/share/ollama/.ollama/models}:/root/.ollama/models:ro
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --- Intelligence pillar: Python ML service (gRPC Embedder) -------------
  ml:
    image: swarm-ml:0.1.0
    init: true
    # Horizontal pillar (system_architecture §9): the ML service is stateless, so
    # it scales out. Compose DNS resolves `ml` to all replica IPs; the kernel
    # reconnects per call (Swarm.ML.Boundary), spreading load and surviving the
    # loss of any one replica. The GPU/Ollama behind them stays a singleton.
    deploy:
      replicas: 2
    build:
      context: ../swarm
      dockerfile: ml/Dockerfile
      args:
        HUB_REGISTRY: ${HUB_REGISTRY:-dockerhub.smile.fr}
        DHI_REGISTRY: ${DHI_REGISTRY:-dhi.smile.fr}
        UV_REGISTRY: ${UV_REGISTRY:-ghcr.io}
    environment:
      SWARM_ML_BIND: 0.0.0.0:50051
      # Reach the containerized Ollama over the compose network (never hardcode).
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    depends_on:
      ollama:
        condition: service_healthy

  # --- Logic / coordination: Elixir kernel (Core API + graph + consilium) -
  kernel:
    image: swarm-kernel:0.1.0
    init: true            # docker-init as PID 1 → reaps the BEAM's epmd child
    build:
      context: ../swarm/kernel
      args:
        HUB_REGISTRY: ${HUB_REGISTRY:-dockerhub.smile.fr}
        DHI_REGISTRY: ${DHI_REGISTRY:-dhi.smile.fr}
    environment:
      SWARM_DB_HOST: postgres
      SWARM_DB_PORT: "5432"
      SWARM_DB_USER: ${SWARM_DB_USER:-swarm}
      SWARM_DB_PASSWORD: ${SWARM_DB_PASSWORD:-swarm}
      SWARM_DB_NAME: ${SWARM_DB_NAME:-swarm_dev}
      SWARM_ML_ADDRESS: ml:50051
      # Dev consilium fleet: small GPU-resident models so an escalated answer
      # returns in seconds, not minutes (this single-GPU box can't swap the heavy
      # default panel of 5 large models + a 70B judge fast enough). Unset these (or
      # override) for prod → the decorrelated heavy panel in swarm config.exs stands.
      # Capable models for real synthesis (the GB10's 128GB keeps them resident, so
      # no swap penalty). qwen3:14b answers + a different-family judge (ADR-7 decorrelation).
      SWARM_CONSILIUM_PANEL: ${SWARM_CONSILIUM_PANEL:-qwen3:14b,gemma4:e4b}
      SWARM_CONSILIUM_JUDGE: ${SWARM_CONSILIUM_JUDGE:-gemma4:31b}
    ports:
      - "${SWARM_CORE_API_PORT:-50061}:50061"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ml:
        condition: service_started

  # --- Plugin adapters (Tier B: out-of-process, gRPC over the port ABI) ---
  # Each plugin is a self-contained dir under ./plugins with its own Dockerfile,
  # vendored proto, and manifest. Polyglot by construction — Python, Go, etc.

  # --- Channel: web_channel (FastAPI/HTMX operator console) ----------------
  # First Tier-B plugin: an out-of-process gRPC CLIENT of the Core API. It speaks
  # exactly the contract cli_channel speaks and NEVER reads the graph DB (ADR-1
  # hive). P0 = channel-only (Ask), fixed operator, public scope; auth is P1.
  web_channel:
    image: web-channel:0.1.0
    init: true
    build:
      context: ./plugins/web_channel
      args:
        DHI_REGISTRY: ${DHI_REGISTRY:-dhi.smile.fr}
        UV_REGISTRY: ${UV_REGISTRY:-ghcr.io}
    environment:
      # Reach the kernel Core API over the compose network (never hardcode a host).
      SWARM_CORE_ADDR: kernel:50061
      # --- P1 identity: Keycloak OIDC. When OIDC_ENABLED, /ask requires login and
      # viewer+scopes come from the token; when off, the P0 fixed-operator path runs.
      OIDC_ENABLED: "true"
      SWARM_VIEWER: ${WEB_CHANNEL_VIEWER:-operator}   # fallback identity only when OIDC is off
      # Browser-reachable issuer (same URL the browser and this container use, so the
      # token `iss` is consistent). Swap to prod = https://sso.smile.eu/realms/Smile.
      OIDC_ISSUER: ${KEYCLOAK_PUBLIC_URL:-http://spark.mpl.intranet:8081}/realms/${KEYCLOAK_REALM:-swarm-local}
      OIDC_CLIENT_ID: ${WEB_CHANNEL_OIDC_CLIENT_ID:-web_channel}
      OIDC_CLIENT_SECRET: ${WEB_CHANNEL_OIDC_SECRET:-web-channel-local-dev-secret-CHANGE-IN-PROD}
      WEB_CHANNEL_BASE_URL: ${WEB_CHANNEL_PUBLIC_URL:-http://spark.mpl.intranet:8080}
      # No committed signing key: empty ⇒ the app mints a random ephemeral key
      # (sessions reset on restart). Set WEB_CHANNEL_SESSION_SECRET (secrets.env) to persist.
      SESSION_SECRET: ${WEB_CHANNEL_SESSION_SECRET:-}
      # group→scope map (JSON); default-deny otherwise. Kernel stays scope authority.
      GROUP_SCOPE_MAP: ${WEB_CHANNEL_GROUP_SCOPE_MAP:-{"confluence":"group"}}
      # Admin API for the groot invite/provision (server-to-server, internal URL).
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-swarm-local}
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Durable conversation log + local credential store (private, on the volume below).
      WEB_CHANNEL_DB: /app/data/web_channel.db
    extra_hosts:
      # Reach the host-published Keycloak port at the same hostname the browser uses,
      # so the OIDC issuer is identical server-side and browser-side (dev split-horizon).
      - "${KEYCLOAK_PUBLIC_HOST:-spark.mpl.intranet}:host-gateway"
    ports:
      - "${WEB_CHANNEL_PORT:-8080}:8080"
    volumes:
      # Private, persistent: conversation log + local users. Never committed.
      - web_channel_data:/app/data
    depends_on:
      kernel:
        condition: service_started

  # --- Identity: local Keycloak (OIDC) — P1 dev login mechanism ------------
  # Mirrors the Smile stack (KC 26.6.1, DHI image, OIDC + groups mapper) so the
  # channel config is swap-able to the real sso.smile.eu/realms/Smile (operator).
  # Dev-mode (start-dev), realm imported from the committed export. Admin + client
  # secret come from env (dev defaults here; real values via secrets.env in prod).
  keycloak:
    image: ${DHI_REGISTRY:-dhi.smile.fr}/keycloak:26.6.1-debian13
    init: true
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./plugins/web_channel/keycloak/realm-swarm-local.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"

  # confluence_connector:
  #   build: ./plugins/confluence_connector
  #   env_file:
  #     - .env
  #     - secrets.env            # creds; never committed, never synced
  #   environment:
  #     OLLAMA_BASE_URL: http://host.docker.internal:11434
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #
  # k8s_tool:                    # Go; connect-mode (runs as its own daemon)
  #   build: ./plugins/k8s_tool
  #   env_file: [.env]
  #   depends_on: [postgres]

volumes:
  # web_channel's private durable store (conversation log + local users). Created
  # owned by the non-root runtime uid (see the plugin Dockerfile). Never committed.
  web_channel_data:
