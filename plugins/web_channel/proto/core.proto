// VENDORED COPY of swarm/proto/core.proto (the kernel's published Core API wire
// contract, package swarm.core.v1). The canonical source is `swarm/proto/core.proto`
// in the public kernel repo; this copy exists only so the Docker build context
// (the plugin dir) is self-contained. Refresh it with `scripts/gen-proto.sh`,
// which copies the canonical proto over this file before generating stubs.
// DO NOT hand-edit — edit the canonical proto in swarm/ and re-run the script.
syntax = "proto3";

// The kernel's outward Core API — the single contract a Channel adapter (CLI,
// web, chat) speaks to. The kernel owns cognition and the single-voice rule
// (Domain 11); a channel only renders and accepts input.
package swarm.core.v1;

service Core {
  // Ask a question: routed through the gate, answered by tier-tools or the
  // consilium, returned with citations and confidence (the single voice).
  rpc Ask(AskRequest) returns (AskResponse);
  // Knowledge-base health (graph size + embedding-namespace stamps).
  rpc KbStatus(StatusRequest) returns (StatusResponse);
  // Retrieval over the graph, scope-filtered.
  rpc KbSearch(SearchRequest) returns (SearchResponse);
  // The panel-vs-judge deliberation behind a past escalated answer, by ask_ref
  // (ADR-15). Read-only, retained, returned only to the owning viewer within scope.
  rpc Deliberation(DeliberationRequest) returns (DeliberationResponse);
  // A bounded, scope-filtered neighborhood around one node: nodes + typed edges
  // (ADR-15). The "connections" surface — never the full hairball.
  rpc Neighborhood(NeighborhoodRequest) returns (NeighborhoodResponse);
  // Worker/job activity as a polled, scope-safe typed event log with an OPAQUE
  // cursor (ADR-15). Poll, not stream; no raw sequence on the wire — the kernel
  // skips out-of-scope events server-side so hidden volume/timing is not inferable.
  rpc ActivityFeed(ActivityFeedRequest) returns (ActivityFeedResponse);
}

message AskRequest {
  string query = 1;
  // Allowed visibility scopes for this context (default-deny; empty ⇒ nothing).
  repeated string scopes = 2;
  // The asker's resolved identity (T8 / P11). The CHANNEL maps a platform user to
  // this canonical id (a deployment fact); the kernel uses it to resolve "my X"
  // and to scope. Empty ⇒ anonymous (a first-person query is then limited).
  string viewer = 3;
}

message Citation {
  string source = 1;
  string ref = 2;
  double confidence = 3;
}

// Answer-result algebra (T6): the typed outcome of a lookup. NOT_FOUND (no such
// item) is distinct from ERROR (transport/adapter failure) and from PARTIAL
// (some sources failed) — a not-found must never masquerade as an outage.
enum AnswerStatus {
  ANSWER_STATUS_UNSPECIFIED = 0;
  FOUND = 1;
  NOT_FOUND = 2;
  PARTIAL = 3;
  ERROR = 4;
}

message AskResponse {
  string answer = 1;
  double confidence = 2;
  string tier = 3;
  repeated Citation citations = 4;
  AnswerStatus status = 5;
  // Opaque handle to the retained panel-vs-judge deliberation (ADR-15), set ONLY
  // when an escalation produced one for a non-anonymous asker; empty otherwise.
  // The channel shows a "see the thinking" affordance only when it is present.
  string ask_ref = 6;
}

message StatusRequest {}

message NamespaceStamp {
  string namespace = 1;
  string model = 2;
  uint32 dim = 3;
  string status = 4;
}

// Per-node-type inventory: how many of each kind the system knows (T8 self-model).
message TypeCount {
  string type = 1;
  int64 count = 2;
}

message StatusResponse {
  int64 nodes = 1;
  int64 edges = 2;
  repeated NamespaceStamp namespaces = 3;
  // Self-model (T8): per-type inventory, last write activity (ISO-8601), and live
  // capabilities (attached connectors + the consilium panel) — all from real state.
  repeated TypeCount inventory = 4;
  string last_activity = 5;
  repeated string capabilities = 6;
}

message SearchRequest {
  string query = 1;
  repeated string scopes = 2;
  uint32 limit = 3;
}

message SearchHit {
  int64 id = 1;
  string type = 2;
  string key = 3;
  double score = 4;
}

message SearchResponse {
  repeated SearchHit hits = 1;
}

// --- Deliberation (ADR-15) -------------------------------------------------

message DeliberationRequest {
  string ask_ref = 1;
  // Allowed visibility scopes for this context (default-deny; same as AskRequest).
  repeated string scopes = 2;
  // The requesting viewer; must own the retained deliberation (ADR-7).
  string viewer = 3;
}

// One panel model's raw take, before the judge synthesized the single voice.
message PanelTake {
  string model = 1;
  string answer = 2;
}

message DeliberationResponse {
  // FOUND ⇒ the panel view below; NOT_FOUND ⇒ unknown/expired ask_ref, or the
  // viewer is not the owner / current scopes no longer cover it (existence never
  // revealed); a non-FOUND response carries ONLY status (no partial read).
  AnswerStatus status = 1;
  string ask_ref = 2;
  string answer = 3;
  double confidence = 4;
  // Mean pairwise panel disagreement [0,1] — a confidence signal (ADR-7).
  double disagreement = 5;
  repeated PanelTake panel = 6;
  string judge = 7;
  // When the deliberation ran (ISO-8601), matching StatusResponse.last_activity.
  string created_at = 8;
}

// --- Neighborhood (ADR-15) -------------------------------------------------

message NeighborhoodRequest {
  int64 node_id = 1;                  // the center (e.g. a SearchHit.id)
  uint32 depth = 2;                   // hops; clamped to [1,2]; 0 ⇒ default 1
  uint32 node_limit = 3;              // max nodes; clamped to [1,50]; 0 ⇒ default 50
  repeated string relation_types = 4; // edge-type filter; empty ⇒ all types
  repeated string scopes = 5;
  string viewer = 6;
}

message NodeView {
  int64 id = 1;
  string type = 2;
  string key = 3;
  string scope = 4;       // always within the request scopes
  double confidence = 5;  // best-path confidence from the center
  uint32 depth = 6;       // min hop-distance from the center
}

message EdgeView {
  int64 src_id = 1;
  int64 dst_id = 2;
  string relation = 3;
  double reliability = 4;
}

message NeighborhoodResponse {
  AnswerStatus status = 1;       // FOUND | NOT_FOUND (center not visible/absent) | ERROR
  int64 center_id = 2;
  repeated NodeView nodes = 3;   // excludes the center; confidence desc then id
  repeated EdgeView edges = 4;   // only between returned in-scope nodes; (src,dst,relation)
  bool truncated = 5;            // node_limit or ADR-3 edge-budget hit (best-effort)
}

// --- ActivityFeed (ADR-15) -------------------------------------------------

message ActivityFeedRequest {
  string cursor = 1;                 // opaque resume token from a prior next_cursor; "" ⇒ most recent
  uint32 limit = 2;                  // clamped to [1,100]; 0 ⇒ default 50
  repeated string kinds = 3;         // event-kind filter (closed set); empty ⇒ all kinds
  repeated string scopes = 4;
  string viewer = 5;
}

message ActivityEvent {
  string kind = 1;          // closed set, e.g. "node_added" | "edge_reinforced" | "node_merged"
  string at = 2;            // ISO-8601
  string subject_type = 3;  // referenced node type (scope-gated, in-scope only); "" if none
  string outcome = 4;       // typed outcome (e.g. "merged" | "refused"); "" if n/a
  int64 count = 5;          // typed count of IN-SCOPE subjects only; 0 if n/a
}

message ActivityFeedResponse {
  AnswerStatus status = 1;            // FOUND | NOT_FOUND (no visible events) | ERROR
  repeated ActivityEvent events = 2;  // already scope-filtered; ordered oldest→newest within the page
  string next_cursor = 3;             // opaque token to pass as the next request.cursor
}
