<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Swarm — web_channel</title>
  <link rel="stylesheet" href="/static/app.css">
  <!-- Vendored locally: the page renders with no external network call (brief §5/§8). -->
  <script src="/static/vendor/htmx.min.js" defer></script>
  <script src="/static/vendor/alpine.min.js" defer></script>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <span class="brand">swarm</span>
      <span class="muted">operator console</span>
      {% if principal %}
        <span class="spacer"></span>
        <span class="muted">{{ principal.display or principal.viewer }} · scopes: {{ principal.scopes|join(', ') }}</span>
        {% if principal.is_groot %}<a class="navlink" href="/admin">admin</a>{% endif %}
        <a class="navlink" href="/logout">logout</a>
      {% endif %}
    </header>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
