{% extends "base.html" %}
{% block content %}
<section class="card login">
  <h2>Local sign in</h2>
  {% if error %}<p class="badge status-error">{{ error }}</p>{% endif %}
  <form method="post" action="/login/local" autocomplete="off">
    <input type="text" name="identifier" value="{{ identifier }}" readonly aria-label="username">
    <input type="password" name="password" placeholder="password"
           autofocus required aria-label="password">
    <button type="submit">Sign in</button>
  </form>
  <p class="muted"><a href="/login">← use a different account</a></p>
</section>
{% endblock %}
