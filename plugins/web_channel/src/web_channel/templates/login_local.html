{% extends "base.html" %}
{% block content %}
<div class="card login">
  <header><h2 class="card-title">Local sign in</h2></header>
  <section>
    {% if error %}<p class="badge status-error">{{ error }}</p>{% endif %}
    <form class="login-form" method="post" action="/login/local" autocomplete="off">
      <input class="input" type="text" name="identifier" value="{{ identifier }}" readonly aria-label="username">
      <input class="input" type="password" name="password" placeholder="password"
             autofocus required aria-label="password">
      <button class="btn" type="submit">Sign in</button>
    </form>
    <p class="muted"><a href="/login">← use a different account</a></p>
  </section>
</div>
{% endblock %}
