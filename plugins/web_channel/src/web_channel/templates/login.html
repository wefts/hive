{% extends "base.html" %}
{% block content %}
<section class="card login">
  <h2>Sign in</h2>
  {% if error %}<p class="badge status-warn">{{ error }}</p>{% endif %}
  <form method="post" action="/login" autocomplete="off">
    <input type="text" name="identifier" placeholder="username or email"
           autofocus required aria-label="username or email">
    <button type="submit">Continue</button>
  </form>
  <p class="muted">One sign-in for everyone — org accounts continue to Keycloak SSO;
    local accounts get a password prompt here.</p>
</section>
{% endblock %}
