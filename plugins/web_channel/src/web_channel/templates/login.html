{% extends "base.html" %}
{% block content %}
<div class="card login">
  <header><h2 class="card-title">Sign in</h2></header>
  <section>
    {% if error %}<p class="badge status-warn">{{ error }}</p>{% endif %}
    <form class="login-form" method="post" action="/login" autocomplete="off">
      <input class="input" type="text" name="identifier" placeholder="username or email"
             autofocus required aria-label="username or email">
      <button class="btn" type="submit">Continue</button>
    </form>
    <p class="muted">One sign-in for everyone — org accounts continue to Keycloak SSO;
      local accounts get a password prompt here.</p>
  </section>
</div>
{% endblock %}
